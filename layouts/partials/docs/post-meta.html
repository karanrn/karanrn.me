{{ with .Date }}
  <time class="post-date" datetime="{{ .Format "2006-01-02" }}">
    {{ partial "docs/date" (dict "Date" . "Format" $.Site.Params.BookDateFormat) }}
  </time>
{{ end }}

{{ if .Params.image }}
<p>
  {{ with .Resources.GetMatch .Params.image }}
    <img src={{ .RelPermalink }} />
  {{ else }}
    <img src={{ .Params.image | relURL }} />
  {{ end }}
</p>
{{ end }}
